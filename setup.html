<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI環境構築スタートガイド | AI指揮官ブリーフィング</title>
  <link rel="stylesheet" href="styles.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KHQQV2JC7B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-KHQQV2JC7B");
  </script>
</head>
<body class="setup-page">
  <div class="ambient" aria-hidden="true">
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>
    <div class="orb orb-three"></div>
    <div class="grid"></div>
    <div class="signal"></div>
    <div class="uplift"></div>
  </div>

  <div class="petal-field" aria-hidden="true">
    <span class="petal" style="--x: 10%; --d: 22s; --delay: -4s; --size: 10px; --drift: 24px;"></span>
    <span class="petal" style="--x: 26%; --d: 24s; --delay: -9s; --size: 12px; --drift: 36px;"></span>
    <span class="petal" style="--x: 44%; --d: 20s; --delay: -5s; --size: 9px; --drift: 22px;"></span>
    <span class="petal" style="--x: 62%; --d: 26s; --delay: -12s; --size: 13px; --drift: 44px;"></span>
    <span class="petal" style="--x: 78%; --d: 21s; --delay: -7s; --size: 10px; --drift: 28px;"></span>
    <span class="petal" style="--x: 92%; --d: 25s; --delay: -10s; --size: 11px; --drift: 40px;"></span>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div class="brand-text">
          <div class="brand-title">AI環境構築スタートガイド</div>
          <div class="brand-sub">指揮官のための入門ブート</div>
        </div>
      </div>

      <div class="quick-links">
        <div class="quick-title">クイックリンク</div>
        <div class="quick-list">
          <a class="quick-link" href="index.html">本編スライド</a>
          <a class="quick-link" href="prompt.html">プロンプト設計</a>
          <a class="quick-link" href="roadmap.html">運用・構築ロードマップ</a>
          <a class="quick-link" href="setup.html">環境構築スタートガイド</a>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-title">セクション</div>
        <ul id="setup-nav" class="nav-list" aria-label="環境構築スタートガイド一覧"></ul>
      </nav>

      <div class="sidebar-foot">
        <div class="hint">操作</div>
        <div class="hint-row">← → キー / クリック</div>
        <div class="hint-row">キーワードをクリックで詳細</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="progress">
          <span id="setup-progress-number">01</span>
          <span class="progress-divider">/</span>
          <span id="setup-progress-total">16</span>
        </div>
        <div class="progress-bar"><span id="setup-progress-bar"></span></div>
        <div class="controls">
          <div class="control-group size-controls" role="group" aria-label="スライドサイズ">
            <button class="btn size-btn" data-size="small" type="button">S</button>
            <button class="btn size-btn is-active" data-size="medium" type="button">M</button>
            <button class="btn size-btn" data-size="large" type="button">L</button>
          </div>
          <div class="control-group zoom-controls" role="group" aria-label="文字拡大">
            <button id="setup-zoom-btn" class="btn" type="button" aria-pressed="false">文字拡大</button>
          </div>
          <div class="control-group view-controls" role="group" aria-label="表示モード">
            <button id="setup-focus-btn" class="btn" type="button" aria-pressed="false">Focus</button>
            <button id="setup-fullscreen-btn" class="btn" type="button" aria-pressed="false">Full</button>
          </div>
          <div class="control-group tts-controls" role="group" aria-label="読み上げ">
            <button id="setup-tts-btn" class="btn" type="button" aria-pressed="false">読み上げ</button>
            <button id="setup-tts-auto-btn" class="btn" type="button" aria-pressed="false">Auto</button>
            <label class="tts-label">速さ
              <input id="setup-tts-rate" class="tts-range" type="range" min="0.7" max="1.3" step="0.1" value="1.0" />
            </label>
            <label class="tts-label">調子
              <input id="setup-tts-pitch" class="tts-range" type="range" min="0.8" max="1.2" step="0.1" value="1.0" />
            </label>
            <select id="setup-tts-voice" class="tts-select" aria-label="音声"></select>
          </div>
          <div class="control-group nav-controls">
            <button id="setup-prev" class="btn" type="button">Prev</button>
            <button id="setup-next" class="btn btn-primary" type="button">Next</button>
          </div>
        </div>
      </header>

      <section class="slide" aria-live="polite">
        <div class="slide-meta">
          <span id="setup-section" class="slide-section">OSとインターフェース</span>
          <span id="setup-variant" class="slide-variant">講義</span>
          <span id="setup-number" class="slide-number">01</span>
        </div>
        <h1 id="setup-title" class="slide-title"></h1>
        <h2 id="setup-headline" class="slide-headline"></h2>
        <div id="setup-body" class="slide-body"></div>
        <div class="keyword-area">
          <div class="keyword-label">キーワード</div>
          <div id="setup-chips" class="keyword-chips"></div>
        </div>
      </section>
    </main>

    <aside class="detail">
      <div class="detail-inner">
        <div class="detail-title">詳細ノート</div>
        <div id="setup-keyword" class="detail-keyword">キーワードを選択</div>
        <div id="setup-text" class="detail-text">本文内のハイライト語をクリックすると、補足の説明が表示されます。</div>
        <div class="detail-footer">
          <div class="detail-foot-label">このスライドの狙い</div>
          <div id="setup-goal" class="detail-goal"></div>
        </div>
      </div>
    </aside>
  </div>

  <script src="setup.js"></script>
</body>
</html>
